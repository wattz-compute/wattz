# Models served by the Wattz bootstrap fleet.
#
# Read by the node-runtime binary via WATTZ_MODELS_FILE and by the deploy
# scripts to know which models to pull. Prices are USD per 1k tokens.

models:
  - name: llama-3.1-8b-instant
    context_window: 131072
    price_per_1k_input_tokens: 0.05
    price_per_1k_output_tokens: 0.10
    license: Llama 3.1 Community License
    kyc_required: false
  - name: llama-3.3-70b-versatile
    context_window: 131072
    price_per_1k_input_tokens: 0.30
    price_per_1k_output_tokens: 0.60
    license: Llama 3.3 Community License
    kyc_required: false
  - name: gpt-oss-20b
    context_window: 131072
    price_per_1k_input_tokens: 0.08
    price_per_1k_output_tokens: 0.16
    license: Apache-2.0
    kyc_required: false
