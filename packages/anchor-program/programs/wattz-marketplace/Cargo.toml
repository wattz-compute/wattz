[package]
name = "wattz-marketplace"
version = "0.1.0"
description = "Wattz Solana AI Inference Marketplace -- settlement, dispute, staking, slashing, node/model registry"
edition = "2021"
license = "Apache-2.0"
authors = ["Wattz Labs Contributors"]
repository = "https://github.com/wattz-compute/wattz"

[lib]
crate-type = ["cdylib", "lib"]
name = "wattz_marketplace"

[features]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
cpi = ["no-entrypoint"]
default = []
idl-build = ["anchor-lang/idl-build", "anchor-spl/idl-build"]

[dependencies]
anchor-lang = { version = "0.31.1", features = ["init-if-needed"] }
anchor-spl = { version = "0.31.1", features = ["associated_token", "token"] }
