[toolchain]
anchor_version = "0.31.1"

[features]
resolution = true
skip-lint = false

[programs.devnet]
wattz_marketplace = "GUDVbE4Jgmtu8jgxUVtq2wUmjdLxJzPqT3zET2EdTLiU"

[programs.localnet]
wattz_marketplace = "GUDVbE4Jgmtu8jgxUVtq2wUmjdLxJzPqT3zET2EdTLiU"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[scripts]
copy-idl = "bash ./scripts/copy-idl.sh"
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[test]
startup_wait = 5000
shutdown_wait = 2000
upgradeable = false

[test.validator]
bind_address = "0.0.0.0"
url = "https://api.devnet.solana.com"
ledger = ".anchor/test-ledger"
rpc_port = 8899

[[test.validator.clone]]
address = "TokenzQdBNbLqP5VEhdkAS6EPFLC1PHnBqCXEpPxuEb"
